# ===== Test configuration (activated by @ActiveProfiles("test")) =====
# A SEPARATE in-memory database named "testdb" so tests never touch
# the runtime "taskdb" data. Each test run starts with empty tables.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop: build the schema before the tests and drop it afterwards.
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.show-sql=true
