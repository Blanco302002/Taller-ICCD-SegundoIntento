# ===== Configuración de tests (se activa con @ActiveProfiles("test")) =====
# Base en MEMORIA y separada ("testdb"), para que los tests NUNCA toquen los
# datos reales de runtime (taskdb en disco). Cada corrida arranca con tablas
# vacías. En tests SÍ queremos memoria: rápido y sin dejar basura en disco.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop: crea el esquema antes de los tests y lo borra al terminar.
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.show-sql=true
