# ===== Configuración de runtime (cuando corrés la app localmente) =====

# Base de datos H2 en modo ARCHIVO: los datos se guardan en disco (carpeta
# ./data) y PERSISTEN entre reinicios de la app. Si en cambio usaras
# "jdbc:h2:mem:taskdb" la base viviría solo en memoria y se borraría al cerrar.
spring.datasource.url=jdbc:h2:file:./data/taskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Le indicamos a Hibernate que la base es H2.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# update: conserva el esquema y los datos ya guardados; solo crea o ajusta
# las tablas si hace falta (NO borra nada). Por eso tus datos quedan.
spring.jpa.hibernate.ddl-auto=update

# Muestra las sentencias SQL en consola (útil para la demo / aprender).
spring.jpa.show-sql=true

# ===== Consola web de H2 =====
# Abrí http://localhost:8080/h2-console en el navegador para inspeccionar la base.
# JDBC URL: jdbc:h2:file:./data/taskdb  | Usuario: sa | Contraseña: (vacía)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
