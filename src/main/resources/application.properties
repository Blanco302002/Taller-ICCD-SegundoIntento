# ===== Runtime configuration (used when you run the app locally) =====

# H2 in-memory database.
# "mem:taskdb" lives in RAM and disappears when the app stops.
# DB_CLOSE_DELAY=-1 keeps the DB alive as long as the JVM runs.
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tell Hibernate it is talking to H2.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Create/drop the tables automatically from the @Entity classes on startup.
spring.jpa.hibernate.ddl-auto=update

# Print the SQL statements in the console (handy for the demo / learning).
spring.jpa.show-sql=true

# ===== H2 web console =====
# Open http://localhost:8080/h2-console in your browser to inspect the DB.
# Use JDBC URL: jdbc:h2:mem:taskdb  | User: sa | Password: (leave empty)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
