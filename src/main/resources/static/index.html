<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo de Tareas</title>

    <!-- Bootstrap 5 desde CDN: nos da estilos lindos sin escribir CSS a mano -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Nuestros pocos estilos propios -->
    <link href="styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 600px;">
        <h1 class="text-center mb-4">📋 Mis Tareas</h1>

        <!-- Formulario para agregar una tarea nueva -->
        <form id="task-form" class="input-group mb-4">
            <input type="text" id="task-title" class="form-control"
                   placeholder="Nueva tarea..." required>
            <button type="submit" class="btn btn-primary">Agregar</button>
        </form>

        <!-- Spinner de "cargando" (se muestra mientras se piden las tareas) -->
        <div id="loading" class="text-center my-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>

        <!-- Acá se dibuja la lista de tareas -->
        <ul id="task-list" class="list-group"></ul>

        <!-- Mensaje cuando no hay tareas -->
        <p id="empty-message" class="text-center text-muted mt-3 d-none">
            No hay tareas todavía. ¡Agregá una! 🎉
        </p>
    </div>

    <!-- Toda la lógica JavaScript vive en su propio archivo -->
    <script src="app.js"></script>
</body>
</html>
