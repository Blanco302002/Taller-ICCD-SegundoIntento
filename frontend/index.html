<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo de Tareas</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 16px; }
        h1 { text-align: center; }
        form { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 8px; }
        button { padding: 8px 16px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .done { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <h1>Mis Tareas</h1>

    <!-- Formulario para agregar una tarea nueva -->
    <form id="task-form">
        <input type="text" id="task-title" placeholder="Nueva tarea..." required>
        <button type="submit">Agregar</button>
    </form>

    <!-- Acá se dibujan las tareas -->
    <ul id="task-list"></ul>

    <script>
        // URL base de la API de Spring Boot.
        const API = "http://localhost:8080/tasks";

        // Trae todas las tareas y las muestra en la lista.
        async function loadTasks() {
            const response = await fetch(API);
            const tasks = await response.json();

            const list = document.getElementById("task-list");
            list.innerHTML = "";

            tasks.forEach(task => {
                const li = document.createElement("li");
                li.textContent = task.title;
                if (task.completed) {
                    li.className = "done";
                }
                list.appendChild(li);
            });
        }

        // Maneja el formulario "Agregar": crea la tarea (POST) y refresca la lista.
        document.getElementById("task-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const titleInput = document.getElementById("task-title");

            await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title: titleInput.value, completed: false })
            });

            titleInput.value = "";
            loadTasks();
        });

        // Carga las tareas cuando se abre la página.
        loadTasks();
    </script>
</body>
</html>
