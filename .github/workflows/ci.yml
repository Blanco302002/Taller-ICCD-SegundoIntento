name: CI

# Run the pipeline on every push to the main branch.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the source code.
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java 21 (Temurin distribution) with Maven dependency caching.
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # 3. Run the tests (unit + integration).
      - name: Run tests
        run: mvn test

      # 4. Build the runnable jar.
      - name: Package application
        run: mvn package
