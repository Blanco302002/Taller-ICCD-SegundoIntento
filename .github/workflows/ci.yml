name: CI/CD

# Dispara el pipeline en cada push a main y en cada Pull Request hacia main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================================
  # 1) BUILD + TESTS  (Integración Continua)
  #    Corre siempre: en los PR y en los push a main.
  # ============================================================
  build:
    name: Build y pruebas automáticas
    runs-on: ubuntu-latest
    steps:
      # Trae el código del repositorio.
      - name: Checkout del código
        uses: actions/checkout@v4

      # Instala Java 21 (Temurin) con cache de dependencias de Maven.
      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Ejecuta las pruebas automáticas (unitarias + integración).
      - name: Correr los tests
        run: mvn test

      # Empaqueta la aplicación en un jar ejecutable.
      - name: Empaquetar la app
        run: mvn package

  # ============================================================
  # 2) DEPLOY a Render  (Entrega Continua)
  #    Solo cuando se hace push/merge a main, y SOLO si build pasó.
  #    Llama al "Deploy Hook" de Render para que despliegue la app.
  # ============================================================
  deploy:
    name: Desplegar en Render
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Disparar deploy en Render
        run: curl -fsSL "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ============================================================
  # 3) FEEDBACK a Slack  (Mecanismo de feedback del esquema)
  #    Avisa al canal con un mensaje claro: estado, commit, autor y link.
  #    'if: always()' = se ejecuta aunque algún job anterior falle.
  # ============================================================
  notify:
    name: Avisar a Slack
    needs: [ build, deploy ]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Enviar mensaje a Slack
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Tomamos solo la primera línea del mensaje del commit (más prolijo).
          COMMIT_LINE=$(printf '%s' "$COMMIT_MSG" | head -n 1)
          SHORT_SHA="${GITHUB_SHA:0:7}"

          # Armamos el texto según haya salido bien o mal.
          if [ "$BUILD_RESULT" = "success" ] && [ "$DEPLOY_RESULT" = "success" ]; then
            TEXT=$(printf '%s\n%s\n%s\n%s' \
              "✅ *Despliegue exitoso* — \`$GITHUB_REPOSITORY\`" \
              "*Commit:* \`$SHORT_SHA\` — $COMMIT_LINE" \
              "*Autor:* $GITHUB_ACTOR" \
              "🔗 <$RUN_URL|Ver pipeline>   ·   <https://tareas-demo.onrender.com|Ver app>")
          else
            TEXT=$(printf '%s\n%s\n%s\n%s' \
              "❌ *El pipeline falló* — \`$GITHUB_REPOSITORY\`" \
              "*Commit:* \`$SHORT_SHA\` — $COMMIT_LINE" \
              "*Autor:* $GITHUB_ACTOR" \
              "🔗 <$RUN_URL|Ver el detalle del error>")
          fi

          # jq arma el JSON escapando todo de forma segura.
          PAYLOAD=$(jq -n --arg text "$TEXT" '{ text: $text }')
          curl -fsSL -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
